
button:
  - platform: template
    id: red_alert_btn
    name: "Red Alert"
    on_press:
      - script.execute:
          id: exc_red_alert

media_player:
  - id: !extend speaker_media_player
    files:
      - id: red_alert_sound
        file: ${red_alert_sound_file}

script:
  - id: exc_red_alert
    then:
      - media_player.speaker.play_on_device_media_file:
          media_file: red_alert_sound
          announcement: true
